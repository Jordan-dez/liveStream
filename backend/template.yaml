AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Livestream Platform Backend - Lambda Functions

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs18.x
    Environment:
      Variables:
        JWT_SECRET: !Ref JWTSecret
        JWT_EXPIRES_IN: 24h
        STREAM_TOKEN_EXPIRES_IN: 2h
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
        FRONTEND_URL: !Ref FrontendUrl
        CORS_ORIGIN: !Ref CorsOrigin
        USERS_TABLE: !Ref UsersTable
        CONCERTS_TABLE: !Ref ConcertsTable
        PURCHASES_TABLE: !Ref PurchasesTable
        STREAM_TOKENS_TABLE: !Ref StreamTokensTable

Parameters:
  JWTSecret:
    Type: String
    NoEcho: true
    Description: Secret key for JWT tokens
  StripeSecretKey:
    Type: String
    NoEcho: true
    Description: Stripe secret key
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Description: Stripe webhook secret
  FrontendUrl:
    Type: String
    Default: http://localhost:3000
    Description: Frontend URL for CORS and redirects
  CorsOrigin:
    Type: String
    Default: '*'
    Description: CORS origin

Resources:
  # DynamoDB Tables
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  ConcertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Concerts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: concertId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: scheduledDate
          AttributeType: S
      KeySchema:
        - AttributeName: concertId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-date-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: scheduledDate
              KeyType: RANGE

  PurchasesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Purchases
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: purchaseId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: purchaseDate
          AttributeType: S
        - AttributeName: concertId
          AttributeType: S
      KeySchema:
        - AttributeName: purchaseId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-concerts-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: purchaseDate
              KeyType: RANGE
        - IndexName: concert-purchases-index
          KeySchema:
            - AttributeName: concertId
              KeyType: HASH
            - AttributeName: purchaseDate
              KeyType: RANGE

  StreamTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StreamTokens
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tokenId
          AttributeType: S
      KeySchema:
        - AttributeName: tokenId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  # API Gateway
  LivestreamApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: !Sub "'${CorsOrigin}'"

  # Auth Functions
  AuthLoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth/login
      Handler: index.handler
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /auth/login
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  AuthRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth/register
      Handler: index.handler
      Events:
        Register:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /auth/register
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  AuthRefreshFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth/refresh
      Handler: index.handler
      Events:
        Refresh:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /auth/refresh
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  AuthVerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/auth/verify
      Handler: index.handler
      Events:
        Verify:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /auth/verify
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  # Concert Functions
  ConcertsListFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/concerts/list
      Handler: index.handler
      Events:
        ListConcerts:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /concerts
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ConcertsTable

  ConcertsGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/concerts/get
      Handler: index.handler
      Events:
        GetConcert:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /concerts/{concertId}
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ConcertsTable

  ConcertsCreateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/concerts/create
      Handler: index.handler
      Events:
        CreateConcert:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /concerts
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConcertsTable

  # Payment Functions
  PaymentCreateCheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payment/create-checkout
      Handler: index.handler
      Events:
        CreateCheckout:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /payment/create-checkout
            Method: post
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ConcertsTable
        - DynamoDBReadPolicy:
            TableName: !Ref PurchasesTable

  PaymentWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payment/webhook
      Handler: index.handler
      Events:
        Webhook:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /payment/webhook
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PurchasesTable

  PaymentVerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/payment/verify
      Handler: index.handler
      Events:
        VerifyPayment:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /payment/verify
            Method: post
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PurchasesTable

  # Stream Functions
  StreamAccessFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stream/access
      Handler: index.handler
      Events:
        StreamAccess:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /stream/access
            Method: post
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ConcertsTable
        - DynamoDBReadPolicy:
            TableName: !Ref PurchasesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref StreamTokensTable

  StreamEmbedUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stream/embed-url
      Handler: index.handler
      Events:
        EmbedUrl:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /stream/embed-url
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref StreamTokensTable
        - DynamoDBReadPolicy:
            TableName: !Ref ConcertsTable

  StreamValidateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/handlers/stream/validate
      Handler: index.handler
      Events:
        ValidateStream:
          Type: Api
          Properties:
            RestApiId: !Ref LivestreamApi
            Path: /stream/validate
            Method: get
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref StreamTokensTable

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${LivestreamApi}.execute-api.${AWS::Region}.amazonaws.com/prod/'

