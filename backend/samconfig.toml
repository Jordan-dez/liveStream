version = 0.1

[default]
[default.global.parameters]
stack_name = "livestream-backend"

[default.build.parameters]
cached = true
parallel = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "eu-west-1"
parameter_overrides = [
    "JWTSecret=CHANGE_ME",
    "StripeSecretKey=CHANGE_ME",
    "StripeWebhookSecret=CHANGE_ME",
    "FrontendUrl=http://localhost:3000",
    "CorsOrigin=*"
]

